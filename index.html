<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>Reveal Multiplex Test</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/black.css">

  <!-- Socket.io (OBRIGATÓRIO pro multiplex) -->
  <script src="https://multiplex.up.railway.app/"></script>
</head>

<body>

<div class="reveal">
  <div class="slides">
    <section>
      <h2>Slide 1</h2>
    </section>

    <section>
      <h2>Slide 2</h2>
    </section>

    <section>
      <h2>Slide 3</h2>
    </section>
  </div>
</div>

<!-- Reveal 5 -->
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>

<!-- Plugins básicos -->
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/highlight.js"></script>

<!-- Multiplex plugin (versão antiga compatível) -->
<script src="https://cdn.jsdelivr.net/gh/reveal/multiplex/client.js"></script>
<script src="https://cdn.jsdelivr.net/gh/reveal/multiplex/master.js"></script>

<script>
  const isMaster = window.location.search.includes('master');

  Reveal.initialize({
    hash: true,

    multiplex: {
      secret: isMaster ? "8fb1fdcc821956d175c5709ab1ab83a5" : null,
      id: "6f2536d385b9c2244214b48b2f5e9f1272f6d6436e91444c5e83e598d381011d",
      url: "https://multiplex.up.railway.app"
    },

    plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
  });
</script>

</body>
</html>
